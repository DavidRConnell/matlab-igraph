name: MATLAB

on:
  push:
    branches: [ simplify-compilation ]
    # tags:
    #   - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  checks: write
  pull-requests: write

# TODO: Add matrix for different OSes
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Pull submodules
        run: git submodule init && git submodule update

      - name: Install linux dependencies
        # if: ${{ matrix.os ... }}
        run: >
          sudo apt update && sudo apt upgrade &&
          sudo apt install cmake gcc g++ libxml2-dev libgmp-dev libglpk-dev
          libarpack2-dev libplfit-dev libopenblas64-dev libbison-dev libfl-dev

      - name: Set up MATLAB
        uses: matlab-actions/setup-matlab@v1

      - name: Build
        run: >
          LD_LIBRARY_PATH=/usr/local/MATLAB/R2023b/sys/os/glnxa64
          make -j toolbox

      - name: Run tests and generate artifacts
        run: make -j check

      - name: Upload Linux test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: runner.os == 'Linux'
        with:
          files : build/tests/*.xml

      # - name: Package dist
      #   run: >
      #     mkdir ${{github.workspace}}/dist
      #     tar czf ${{github.workspace}}/dist/matlab-igraph-${{matrix.os}}.tar.gz

